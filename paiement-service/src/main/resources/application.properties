# Port et nom de l'application
server.port=8083
spring.application.name=paiement-service

# --- Base de données ---
# Par défaut, on utilise PostgreSQL en production, ou H2 pour les tests locaux en mode développement
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/service2db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:service1user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:service1pass}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# Configuration JPA pour Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Eureka Client ---
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}

# --- Management Endpoints ---
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.com.example.paiement_service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n