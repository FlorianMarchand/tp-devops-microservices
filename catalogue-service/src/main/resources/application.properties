# Configuration du port du serveur
server.port=8081
spring.application.name=catalogue-service

# --- Base de données ---
# Utilisation de PostgreSQL en production, ou H2 en mode développement (optionnelle via un profil ou variable d'environnement)
spring.datasource.url=jdbc:postgresql://localhost:5432/service1db
spring.datasource.username=service1user
spring.datasource.password=service1pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Eureka Client ---
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}

# --- Management Endpoints ---
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.com.example.catalogue_service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n